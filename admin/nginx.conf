server {
  listen 80;
  server_name _;
  client_max_body_size 25m;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://backend:8000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /uploads/ {
    proxy_pass http://backend:8000/uploads/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Admin should live under /admin (same domain as customer frontend)
  location = /admin {
    return 301 /admin/;
  }

  # /admin/ must serve the SPA shell
  location = /admin/ {
    rewrite ^ /index.html break;
  }

  # Serve SPA under /admin/* while keeping built files at /
  location /admin/ {
    rewrite ^/admin/(.*)$ /$1 break;
    try_files $uri /index.html;
  }

  # IMPORTANT:
  # /admin/* deep routes internally redirect to /index.html via try_files.
  # We must allow /index.html to be served, otherwise the catch-all below
  # will return 404 and browser refresh will break.
  location = /index.html {
    try_files /index.html =404;
  }

  # If someone hits the container root directly, send them to /admin/
  location = / {
    return 302 /admin/;
  }

  # Everything else under this container is not expected
  location / {
    return 404;
  }
}

