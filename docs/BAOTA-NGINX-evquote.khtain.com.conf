# Baota / Nginx vhost example for evquote.khtain.com
#
# Goal:
# - Customer site: https://evquote.khtain.com/
# - Admin:         https://evquote.khtain.com/admin/
# - API:           https://evquote.khtain.com/api/
# - Uploads:       https://evquote.khtain.com/uploads/
#
# Docker (VPS mode) should bind only to localhost:
# - frontend: 127.0.0.1:7620
# - admin:    127.0.0.1:7621
# - backend:  127.0.0.1:7622
#
# Start docker:
#   docker compose -f docker-compose.yml -f docker-compose.vps.yml --env-file .env up -d --build

server
{
    listen 80;
    listen 443 ssl http2;
    server_name evquote.khtain.com;
    index index.php index.html index.htm default.php default.htm default.html;
    root /www/wwwroot/evquote.khtain.com;

    #CERT-APPLY-CHECK--START
    include /www/server/panel/vhost/nginx/well-known/evquote.khtain.com.conf;
    #CERT-APPLY-CHECK--END

    #SSL-START SSL相关配置，请勿删除或修改下一行带注释的404规则
    #error_page 404/404.html;
    #HTTP_TO_HTTPS_START
    set $isRedcert 1;
    if ($server_port != 443) {
        set $isRedcert 2;
    }
    if ( $uri ~ /\.well-known/ ) {
        set $isRedcert 1;
    }
    if ($isRedcert != 1) {
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    #HTTP_TO_HTTPS_END

    ssl_certificate    /www/server/panel/vhost/cert/evquote.khtain.com/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/evquote.khtain.com/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497  https://$host$request_uri;
    #SSL-END

    client_max_body_size 25m;

    # ---- Reverse proxy to docker services ----
    # Keep ACME challenge served from local webroot
    location ^~ /.well-known/ {
        allow all;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:7622;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    location ^~ /uploads/ {
        proxy_pass http://127.0.0.1:7622;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    location = /admin {
        return 301 /admin/;
    }

    location ^~ /admin/ {
        proxy_pass http://127.0.0.1:7621;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # Customer site
    location ^~ / {
        proxy_pass http://127.0.0.1:7620;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # ---- Baota defaults / safety (optional) ----
    # PHP not required for this project, you can comment it out:
    # include enable-php-80.conf;

    #禁止访问的文件或目录
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md)
    {
        return 404;
    }

    #ERROR-PAGE-START
    error_page 404 /404.html;
    #ERROR-PAGE-END

    access_log  /www/wwwlogs/evquote.khtain.com.log;
    error_log  /www/wwwlogs/evquote.khtain.com.error.log;
}

