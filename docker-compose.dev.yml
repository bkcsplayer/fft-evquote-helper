services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-ev_charger_quote}
      POSTGRES_USER: ${DB_USER:-ev_charger}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your_secure_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "7223:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ev_charger} -d ${DB_NAME:-ev_charger_quote}"]
      interval: 5s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: development
      DB_USER: ${DB_USER:-ev_charger}
      DB_PASSWORD: ${DB_PASSWORD:-your_secure_password}
      DB_NAME: ${DB_NAME:-ev_charger_quote}
      DB_HOST: db
      DB_PORT: 5432
      SECRET_KEY: ${SECRET_KEY:-dev_secret_key}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:7230}
      ADMIN_URL: ${ADMIN_URL:-http://localhost:7231}
      # Stripe disabled (kept only for compatibility)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # Optional integrations
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-}
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    ports:
      - "7222:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\""]
      interval: 10s
      timeout: 3s
      retries: 30

volumes:
  pgdata:
